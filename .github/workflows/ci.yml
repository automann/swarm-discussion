name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate marketplace.json
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path(".claude-plugin/marketplace.json").read_text())
          assert manifest.get("name"), "marketplace name required"
          owner = manifest.get("owner")
          assert isinstance(owner, dict) and owner.get("name"), "owner.name required"
          plugins = manifest.get("plugins")
          assert isinstance(plugins, list) and plugins, "plugins[] required and non-empty"

          allowed_sources = {"github", "url", "git-subdir", "local"}
          for plugin in plugins:
              name = plugin.get("name")
              assert name, "plugin entry needs a name"
              source = plugin.get("source")
              assert source, f"{name}: source required"
              if isinstance(source, dict):
                  kind = source.get("source")
                  assert kind in allowed_sources, f"{name}: bad source type {kind!r}"
                  if kind == "github":
                      assert "/" in source.get("repo", ""), f"{name}: github repo must be owner/name"
                      assert source.get("ref") or source.get("sha"), f"{name}: pin a ref or sha"
              elif isinstance(source, str):
                  assert ".." not in source, f"{name}: source path must not traverse"
          print(f"marketplace OK: {len(plugins)} plugin(s)")
          PY

      - name: No leftover plugin/runtime code (thin aggregator)
        run: |
          for path in plugins runtime conformance .agents; do
            if [ -e "$path" ]; then echo "unexpected directory on the aggregator: $path"; exit 1; fi
          done
          echo "aggregator is thin"
